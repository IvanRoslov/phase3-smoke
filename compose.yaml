# Lessly Phase 3 smoke test — exercises the full compose-first flow:
#   • non-root images (PSA restricted passes — all run nginx-unprivileged
#     under UID 101, which is the only public image we can rely on for
#     anonymous pulls + PSA-restricted compatibility right now)
#   • named volume mounted into db (PVC + mount strip in canvas)
#   • ${VAR} compose variables (wizard step prompts for TAG)
#   • depends_on chain (init-container wait-for-port)
#   • multi-service private DNS (api waits on cache:8080 and db:8080 by slug)
#
# All three pods serve nginx on port 8080 — they're not real redis/postgres,
# they're stand-ins to verify the runtime mechanics (init ordering, mount,
# private DNS) end-to-end. Once Phase 5 ships managed databases, swap in
# real bitnami images at the cgr.dev/chainguard registry, or after we wire
# image-pull credentials for private registries.

services:
  cache:
    image: nginxinc/nginx-unprivileged:1.27-alpine

  db:
    image: nginxinc/nginx-unprivileged:1.27-alpine
    volumes:
      - db_data:/tmp/data

  api:
    image: nginxinc/nginx-unprivileged:1.27-alpine
    environment:
      VERSION: ${TAG}
    depends_on:
      - cache
      - db

volumes:
  db_data:
